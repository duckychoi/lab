<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cross-Domain Research Map 2026 — MoE · iRoPE · 3DGS-SLAM · Quadruped · Distillation</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #0f0f0f;
      --surface2: #141414;
      --border: #1c1c1c;
      --border-hover: #2a2a2a;
      --text-primary: #f0f0f0;
      --text-secondary: #888;
      --text-muted: #444;
      --accent: #00ff88;
      --accent-dim: rgba(0,255,136,0.1);

      /* Domain colors */
      --moe: #818cf8;
      --irope: #34d399;
      --slam: #fb923c;
      --quad: #f472b6;
      --distil: #facc15;

      --radius: 12px;
      --transition: 200ms cubic-bezier(0.4,0,0.2,1);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }

    /* ── HEADER ── */
    .site-header {
      padding: 56px 24px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .site-header::before {
      content: '';
      position: absolute;
      top: -100px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 350px;
      background: radial-gradient(ellipse, rgba(0,255,136,0.05) 0%, transparent 70%);
      pointer-events: none;
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent);
      border: 1px solid rgba(0,255,136,0.3); border-radius: 999px;
      padding: 5px 14px; background: var(--accent-dim); margin-bottom: 20px;
    }
    .eyebrow::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(0.7); } }

    .site-header h1 {
      font-size: clamp(20px,3.5vw,36px); font-weight: 800;
      letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 14px;
      background: linear-gradient(135deg,#fff 0%,#aaa 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .site-header p {
      font-size: 14px; color: var(--text-secondary); max-width: 560px;
      margin: 0 auto 28px; line-height: 1.75;
    }

    /* Domain pills */
    .domain-pills {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
      margin-bottom: 16px;
    }
    .domain-pill {
      padding: 5px 14px; border-radius: 999px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid transparent;
      transition: all var(--transition); user-select: none;
    }
    .domain-pill.active { opacity: 1; }
    .domain-pill.inactive { opacity: 0.3; }

    /* ── MAIN ── */
    .main { max-width: 1300px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── DOMAIN MAP ── */
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px;
    }

    .domain-map {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 48px; padding: 24px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px;
    }
    .domain-node {
      flex: 1; min-width: 140px;
      padding: 16px 14px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      transition: all var(--transition);
    }
    .domain-node:hover { transform: translateY(-2px); }
    .domain-node-icon { font-size: 22px; margin-bottom: 8px; }
    .domain-node-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .domain-node-sub { font-size: 11px; color: var(--text-muted); line-height: 1.5; }

    /* ── RESEARCH CARDS ── */
    .research-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 1100px) { .research-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 640px)  { .research-grid { grid-template-columns: 1fr; } .main { padding: 0 16px 60px; } }

    .research-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      cursor: pointer;
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition), opacity var(--transition);
      display: flex; flex-direction: column; gap: 14px;
      position: relative;
      animation: cardIn 350ms ease both;
    }
    @keyframes cardIn { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    .research-card:hover { transform: scale(1.02) translateY(-2px); }
    .research-card.hidden { display: none; }
    .research-card.dimmed { opacity: 0.25; pointer-events: none; }

    .card-rank {
      position: absolute; top: 16px; right: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--text-muted); font-weight: 600;
    }

    .card-domains {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .card-domain-tag {
      padding: 3px 9px; border-radius: 999px; font-size: 10px; font-weight: 700;
      letter-spacing: 0.04em;
    }

    .card-title { font-size: 15px; font-weight: 700; line-height: 1.35; letter-spacing: -0.01em; }
    .card-subtitle { font-size: 11px; color: var(--text-muted); font-style: italic; font-weight: 500; margin-top: -6px; }
    .card-desc { font-size: 12.5px; color: var(--text-secondary); line-height: 1.65; flex: 1; }

    .card-gap-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 700; color: var(--accent);
      background: var(--accent-dim); border: 1px solid rgba(0,255,136,0.2);
      border-radius: 6px; padding: 4px 10px;
      align-self: flex-start;
    }
    .card-gap-badge::before { content: '◈'; font-size: 9px; }

    .card-scores {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 8px;
    }
    .score-item { text-align: center; }
    .score-bar-wrap {
      height: 3px; background: var(--border); border-radius: 2px;
      margin-bottom: 4px; overflow: hidden;
    }
    .score-bar { height: 100%; border-radius: 2px; }
    .score-label { font-size: 9px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
    .score-val { font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88); backdrop-filter: blur(8px);
      z-index: 100; display: flex; align-items: center; justify-content: center;
      padding: 24px; opacity: 0; pointer-events: none; transition: opacity 250ms ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: #111; border: 1px solid #252525;
      border-radius: 18px; max-width: 680px; width: 100%;
      max-height: 88vh; overflow-y: auto; position: relative;
      transform: scale(0.93) translateY(18px);
      transition: transform 260ms cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 32px 100px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.04);
    }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }

    .modal-header {
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: #111; z-index: 10;
    }
    .modal-header-top {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
      margin-bottom: 14px;
    }
    .modal-close {
      width: 32px; height: 32px; border-radius: 8px;
      background: #1e1e1e; border: 1px solid #2a2a2a; color: var(--text-muted);
      font-size: 15px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; transition: all var(--transition);
    }
    .modal-close:hover { background: #2a2a2a; color: var(--text-primary); }

    .modal-title { font-size: 20px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.25; margin-bottom: 5px; }
    .modal-subtitle { font-size: 12px; color: var(--text-muted); font-style: italic; }

    .modal-body { padding: 24px 28px 28px; display: flex; flex-direction: column; gap: 22px; }

    .modal-section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px;
    }
    .modal-text { font-size: 14px; color: var(--text-secondary); line-height: 1.78; }
    .modal-text strong { color: var(--text-primary); font-weight: 600; }

    .modal-papers { display: flex; flex-direction: column; gap: 8px; }
    .modal-paper {
      padding: 11px 14px; border-radius: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      display: flex; align-items: flex-start; gap: 10px;
    }
    .paper-id {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      font-weight: 600; color: var(--accent); flex-shrink: 0;
      padding-top: 1px;
    }
    .paper-title { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
    .paper-title em { color: var(--text-muted); font-style: normal; font-size: 11px; }

    .modal-arch {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      color: #aaa; line-height: 1.8; white-space: pre-wrap; overflow-x: auto;
    }

    .modal-scores {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 12px;
    }
    .modal-score-item {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; text-align: center;
    }
    .modal-score-val { font-size: 22px; font-weight: 800; margin-bottom: 3px; }
    .modal-score-label { font-size: 10px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }

    .modal-connections { display: flex; flex-wrap: wrap; gap: 8px; }
    .conn-chip {
      padding: 5px 12px; border-radius: 999px; font-size: 11px; font-weight: 600;
      border: 1px solid transparent;
    }

    /* ── FOOTER ── */
    .site-footer {
      border-top: 1px solid var(--border); padding: 22px 24px;
      text-align: center; color: var(--text-muted); font-size: 11px;
    }
    .site-footer span { color: var(--accent); }
  </style>
</head>
<body>

<header class="site-header">
  <div class="eyebrow">Cross-Domain Research Map · 2026</div>
  <h1>미탐색 연구 교차점<br>MoE · iRoPE · 3DGS-SLAM · 사족보행 · Distillation</h1>
  <p>5개 기술 도메인의 최신 동향과 미해결 문제를 분석하여<br>공백 영역에서 도출한 6개의 고임팩트 연구 주제입니다.</p>
  <div class="domain-pills" id="domainPills"></div>
</header>

<main class="main">
  <div class="section-label" style="margin-bottom:12px">기술 도메인 지형도</div>
  <div class="domain-map" id="domainMap"></div>

  <div class="section-label">제안 연구 주제 (6개)</div>
  <div class="research-grid" id="researchGrid"></div>
</main>

<footer class="site-footer">
  Research gap analysis based on papers up to <span>April 2026</span> · arXiv · CVPR · ICLR · CoRL · ICRA
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-header-top">
        <div class="modal-domains" id="modalDomains"></div>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-subtitle" id="modalSubtitle"></div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const DOMAINS = [
  { id:'moe',    label:'MoE',          color:'#818cf8', icon:'🧩', sub:'라우팅·전문가 분업·스케일링 법칙' },
  { id:'irope',  label:'iRoPE',        color:'#34d399', icon:'🌀', sub:'NoPE·장문 컨텍스트·멀티모달 위치' },
  { id:'slam',   label:'3DGS-SLAM',    color:'#fb923c', icon:'🗺️', sub:'가우시안 맵·동적 씬·엣지 배포' },
  { id:'quad',   label:'사족보행',      color:'#f472b6', icon:'🐾', sub:'RL 운동·지형 적응·시각 통합' },
  { id:'distil', label:'Distillation', color:'#facc15', icon:'⚗️', sub:'CoT 증류·VLA→정책·온라인 증류' },
];

const RESEARCH = [
  {
    id: 'R1',
    title: 'DynMoE-SLAM',
    subtitle: 'MoE Gaussian Lifecycle Management for Dynamic 3DGS-SLAM',
    domains: ['moe','slam'],
    gap: '동적 씬 3DGS-SLAM — 논문 없음',
    desc: '현재 3DGS-SLAM은 동적 객체(사람·차량)를 처리하지 못합니다. Dy3DGS-SLAM이 시도하지만 실시간 정확도 모두 부족. MoE 라우터로 가우시안 라이프사이클(정적·동적·반정적)을 분류해 각 전문가 모듈이 독립 처리.',
    novelty: 95, feasibility: 80, impact: 85,
    arch: `입력 프레임
  ↓
MoE 라우터 (가우시안 당 분류)
  ├─ Expert A (Static)    → 고정밀 점진 업데이트
  ├─ Expert B (Dynamic)   → 빠른 삭제·재생성
  └─ Expert C (Semi-static) → 저빈도 업데이트
  ↓
통합 3DGS 맵`,
    papers: [
      { id:'2506.05965', title:'Dy3DGS-SLAM: Monocular 3DGS SLAM for Dynamic Environments', year:'2025' },
      { id:'2408.15664', title:'Auxiliary-Loss-Free Load Balancing for MoE (DeepSeek)', year:'2024' },
      { id:'2505.16278', title:'DriveMoE: Vision-MoE + Action-MoE for Driving', year:'2025' },
    ],
    connections: ['moe','slam'],
    why: 'DeepSeek의 보조손실 없는 부하분산 기법을 가우시안 밀도 균형에 직접 적용. awesome-3DGS-SLAM 서베이에 MoE 결합 논문 없음으로 완전 공백 확인.',
  },
  {
    id: 'R2',
    title: 'GaussLoco-Distill',
    subtitle: 'MoE Expert Distillation via 3DGS Scene Representations',
    domains: ['moe','quad','slam','distil'],
    gap: 'MoE→Dense 사족보행 정책 증류 — 논문 없음 (확인)',
    desc: 'DeepSeek-R1의 MoE→소형 Dense 증류 성공을 로봇 운동 정책에 최초 적용. 지형별 전문가(계단·경사·험지·실내) MoE 교사를 3DGS 씬 렌더링으로 훈련하고 통합 학생 정책으로 증류.',
    novelty: 98, feasibility: 85, impact: 95,
    arch: `Phase 1: 지형별 MoE 전문가 훈련 (시뮬레이션 + 3DGS 씬)
  Expert_계단  Expert_경사  Expert_험지  Expert_실내

Phase 2: 3DGS 맵 기반 지형 라우팅
  실시간 3DGS SLAM → 전방 지형 분류 → 전문가 선택

Phase 3: MoE 앙상블 → 소형 Dense 학생 정책 증류
  "Parkour in the wild" 방식 + R1 Distill 레시피`,
    papers: [
      { id:'2505.11164', title:'Parkour in the Wild: Multi-Expert Distillation RL', year:'2025' },
      { id:'2501.12948', title:'DeepSeek-R1: MoE Teacher → Dense Student Distillation', year:'2025' },
      { id:'2503.05833', title:'Refined Policy Distillation (RPD): VLA→RL Expert', year:'2025' },
      { id:'2507.07818', title:'MoSE: Skill-by-Skill MoE for Embodied Agents', year:'2025' },
    ],
    connections: ['moe','quad','slam','distil'],
    why: '에이전트 조사로 "MoE → Dense 로봇 운동 제어" 논문 부재 확인. DeepSeek-R1 증류 레시피 + Parkour 다중 전문가 증류 RL + 3DGS 씬 표현을 결합하면 세 분야 커뮤니티를 동시에 공략 가능.',
  },
  {
    id: 'R3',
    title: 'Splat-Edge Online',
    subtitle: 'Real-Time 3DGS SLAM Distillation for On-Robot Edge Deployment',
    domains: ['slam','distil','quad'],
    gap: '온라인 온디바이스 3DGS 증류 — 논문 없음',
    desc: '"Splat and Distill" (2026)은 오프라인. 사족보행 로봇(Jetson Orin급)이 클라우드 서버의 완전한 3DGS SLAM에서 실시간으로 중요 가우시안만 스트리밍 증류하는 온라인 프레임워크.',

    arch: `클라우드 서버 (교사)          로봇 온보드 (학생)

└──────────────┘  (4bit 압축)  └──────────────┘

    papers: [
      { id:'2602.06032', title:'Splat and Distill: 3DGS-Augmented VFM Distillation', year:'2026' },
      { id:'2601.20262', title:'Shallow-π: Compressing VLA for Jetson Orin Hardware', year:'2026' },
      { id:'2504.03597', title:'Real-is-Sim: Embodied Gaussians for Sim-to-Real', year:'2025' },
      { id:'3725843.3756109', title:'REACT3D: Edge Accelerator for Incremental 3DGS Training', year:'2025' },
    ],
    connections: ['slam','distil','quad'],
    why: '"Shallow-π"가 Jetson 하드웨어 VLA 압축 가능성 확인. REACT3D가 엣지 하드웨어 접근 검증. 온라인 실시간 증류 + 가우시안 압축 전송의 소프트웨어 프레임워크는 미탐색.',
  },
  {
    id: 'R4',
    title: 'iRoPE-Loco',
    subtitle: 'Interleaved Position-Aware Terrain Memory for Quadruped Navigation',
    domains: ['irope','quad','slam'],
    gap: 'iRoPE를 운동 정책 네트워크에 적용 — 논문 없음',
    desc: '사족보행 로봇의 지형 기억은 본질적으로 장문 순차 문제. NoPE 레이어(글로벌 과거 지형 검색) + RoPE 레이어(국소 발판 위치 인식)의 분업을 운동 정책 트랜스포머에 직접 도입.',
    novelty: 92, feasibility: 72, impact: 80,
    arch: `관측: 고유감각(IMU·관절각) + 3DGS 지형 토큰
  ↓
iRoPE 정책 트랜스포머
  RoPE 레이어 ×3: 최근 8스텝 발판 패턴 (정밀 위치)
  NoPE 레이어 ×1: 전체 에피소드 유사 지형 검색
  ↓
행동 출력 (관절 토크)`,
    papers: [
      { id:'2501.18795', title:'RoPE to NoPE and Back Again: Emergent Division of Labor', year:'2025' },

      { id:'2510.25889', title:'π_RL: RL for Flow-based VLAs (π0, π0.5)', year:'2025' },

           → 로봇 3D 자세를 회전 임베딩으로 인코딩

3DGS 가우시안 클러스터 → 공간 토큰 변환
  NoPE 레이어: 전역 씬 의미 검색
  Q-RoPE 레이어: 국소 자세 기반 공간 어텐션`,
    papers: [
      { id:'2502.11664', title:'VRoPE: Fixing Video Positional Encoding Flaws', year:'2025' },
      { id:'2510.23095', title:'Revisiting Multimodal Positional Encoding at Scale', year:'2025' },

      { id:'2501.12948', title:'DeepSeek-R1: Expert Specialization Theory', year:'2025' },

// ─── Hex helper ───
function hex2rgba(h, a) {
  const r=parseInt(h.slice(1,3),16), g=parseInt(h.slice(3,5),16), b=parseInt(h.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ─── Domain map ───
const domainMap = document.getElementById('domainMap');
DOMAINS.forEach(d => {
  const node = document.createElement('div');
  node.className = 'domain-node';
  node.style.background = hex2rgba(d.color, 0.07);
  node.style.borderColor = hex2rgba(d.color, 0.25);
  node.innerHTML = `
    <div class="domain-node-icon">${d.icon}</div>
    <div class="domain-node-name" style="color:${d.color}">${d.label}</div>
    <div class="domain-node-sub">${d.sub}</div>
  `;
  node.addEventListener('click', () => filterByDomain(d.id));
  domainMap.appendChild(node);
});

// ─── Domain pills ───
const pillsEl = document.getElementById('domainPills');
let activeFilters = new Set();

const allPill = document.createElement('button');
allPill.className = 'domain-pill active';
allPill.style.background = 'rgba(0,255,136,0.1)';
allPill.style.color = '#00ff88';
allPill.style.borderColor = 'rgba(0,255,136,0.3)';
allPill.textContent = '전체';
allPill.addEventListener('click', () => { activeFilters.clear(); applyFilter(); });
pillsEl.appendChild(allPill);

DOMAINS.forEach(d => {
  const pill = document.createElement('button');
  pill.className = 'domain-pill';
  pill.dataset.id = d.id;
  pill.style.background = hex2rgba(d.color, 0.1);
  pill.style.color = d.color;
  pill.style.borderColor = hex2rgba(d.color, 0.3);
  pill.textContent = d.label;
  pill.addEventListener('click', () => filterByDomain(d.id));
  pillsEl.appendChild(pill);
});

function filterByDomain(id) {
  if (activeFilters.has(id)) { activeFilters.delete(id); }
  else { activeFilters.add(id); }
  applyFilter();
}

function applyFilter() {
  const cards = document.querySelectorAll('.research-card');
  cards.forEach(card => {
    const domains = JSON.parse(card.dataset.domains);
    const show = activeFilters.size === 0 || domains.some(d => activeFilters.has(d));
    card.classList.toggle('dimmed', !show);
  });
  // Update pill states
  document.querySelectorAll('.domain-pill[data-id]').forEach(p => {
    const active = activeFilters.has(p.dataset.id);
    p.style.opacity = active ? '1' : (activeFilters.size === 0 ? '1' : '0.35');
  });
}

// ─── Research cards ───
const grid = document.getElementById('researchGrid');
RESEARCH.forEach((r, idx) => {
  const card = document.createElement('div');
  card.className = 'research-card';
  card.dataset.domains = JSON.stringify(r.domains);
  card.style.animationDelay = `${idx * 60}ms`;

  const domainColors = r.domains.map(id => DOMAINS.find(d=>d.id===id));
  const primary = domainColors[0];

  card.addEventListener('mouseenter', () => {
    card.style.borderColor = hex2rgba(primary.color, 0.4);
    card.style.boxShadow = `0 0 28px ${hex2rgba(primary.color, 0.1)}, 0 8px 40px rgba(0,0,0,0.5)`;
  });
  card.addEventListener('mouseleave', () => {
    card.style.borderColor = '';
    card.style.boxShadow = '';
  });

  const tagsHtml = domainColors.map(d =>
    `<span class="card-domain-tag" style="background:${hex2rgba(d.color,0.12)};color:${d.color};border-color:${hex2rgba(d.color,0.25)}">${d.label}</span>`
  ).join('');

  const scoresHtml = [
    { label:'신규성', val:r.novelty, color:primary.color },
    { label:'실현성', val:r.feasibility, color:'#60a5fa' },
    { label:'임팩트', val:r.impact, color:primary.color },
  ].map(s => `
    <div class="score-item">
      <div class="score-bar-wrap"><div class="score-bar" style="width:${s.val}%;background:${s.color}"></div></div>
      <div class="score-val" style="color:${s.color}">${s.val}</div>
      <div class="score-label">${s.label}</div>
    </div>
  `).join('');

  card.innerHTML = `
    <div class="card-rank">${r.id}</div>
    <div class="card-domains">${tagsHtml}</div>
    <div>
      <div class="card-title">${r.title}</div>
      <div class="card-subtitle">${r.subtitle}</div>
    </div>
    <div class="card-desc">${r.desc}</div>
    <div class="card-gap-badge">${r.gap}</div>
    <div class="card-scores">${scoresHtml}</div>
  `;
  card.addEventListener('click', () => openModal(r));
  grid.appendChild(card);
});

// ─── Modal ───
const overlay = document.getElementById('modalOverlay');

function openModal(r) {
  const domainColors = r.domains.map(id => DOMAINS.find(d=>d.id===id));
  const primary = domainColors[0];

  document.getElementById('modalDomains').innerHTML = domainColors.map(d =>
    `<span class="card-domain-tag" style="background:${hex2rgba(d.color,0.12)};color:${d.color};border-color:${hex2rgba(d.color,0.25)};padding:4px 11px;border-radius:999px;font-size:11px;font-weight:700;border:1px solid">${d.icon} ${d.label}</span>`
  ).join(' ');

  document.getElementById('modalTitle').textContent = r.title;
  document.getElementById('modalSubtitle').textContent = r.subtitle;

  const body = document.getElementById('modalBody');
  body.innerHTML = `
    <div>
      <div class="modal-section-label">연구 배경 및 공백</div>
      <div class="modal-text">${r.desc}</div>
    </div>
    <div>
      <div class="modal-section-label" style="color:var(--accent)">왜 지금인가</div>
      <div class="modal-text">${r.why}</div>
    </div>
    <div>
      <div class="modal-section-label">시스템 구조 (개념)</div>
      <div class="modal-arch">${r.arch}</div>
    </div>
    <div>
      <div class="modal-section-label">핵심 연계 논문</div>
      <div class="modal-papers">
        ${r.papers.map(p => `
          <div class="modal-paper">
            <div class="paper-id">${p.id.length < 12 ? p.id : p.id.slice(0,10)+'…'}</div>
            <div class="paper-title">${p.title} <em>· ${p.year}</em></div>
          </div>
        `).join('')}
      </div>
    </div>
    <div>
      <div class="modal-section-label">평가 점수</div>
      <div class="modal-scores">
        ${[['신규성', r.novelty, primary.color], ['실현가능성', r.feasibility, '#60a5fa'], ['임팩트', r.impact, primary.color]].map(([l,v,c]) => `
          <div class="modal-score-item" style="border-color:${hex2rgba(c,0.2)}">
            <div class="modal-score-val" style="color:${c}">${v}</div>
            <div class="modal-score-label">${l}</div>
          </div>
        `).join('')}
      </div>
    </div>
    <div>
      <div class="modal-section-label">연결 도메인</div>
      <div class="modal-connections">
        ${r.connections.map(id => {
          const d = DOMAINS.find(x=>x.id===id);
          return `<span class="conn-chip" style="background:${hex2rgba(d.color,0.12)};color:${d.color};border-color:${hex2rgba(d.color,0.25)}">${d.icon} ${d.label}</span>`;
        }).join('')}
      </div>
    </div>
  `;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

document.getElementById('modalClose').addEventListener('click', () => {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
});
overlay.addEventListener('click', e => {
  if (e.target === overlay) { overlay.classList.remove('open'); document.body.style.overflow = ''; }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { overlay.classList.remove('open'); document.body.style.overflow = ''; }
});
</script>
</body>
</html>
