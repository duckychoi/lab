<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM 경량화·최적화 기술 트렌드 TOP 20 (2025~2026)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --border-hover: #2a2a2a;
      --text-primary: #f0f0f0;
      --text-secondary: #888888;
      --text-muted: #555555;
      --accent: #00ff88;
      --accent-dim: rgba(0, 255, 136, 0.12);
      --accent-glow: rgba(0, 255, 136, 0.25);
      --modal-overlay: rgba(0, 0, 0, 0.85);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 6px;
      --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    /* =================== HEADER =================== */
    .site-header {
      position: relative;
      padding: 64px 24px 48px;
      text-align: center;
      overflow: hidden;
    }

    .site-header::before {
      content: '';
      position: absolute;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 300px;
      background: radial-gradient(ellipse at center, rgba(0, 255, 136, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .header-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
      padding: 6px 14px;
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 999px;
      background: var(--accent-dim);
    }

    .header-eyebrow::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .site-header h1 {
      font-size: clamp(22px, 4vw, 38px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #ffffff 0%, #cccccc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .site-header p {
      font-size: 15px;
      color: var(--text-secondary);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* =================== STATS BAR =================== */
    .stats-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0;
      margin: 32px auto 0;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .stat-item {
      flex: 1;
      padding: 16px 12px;
      text-align: center;
      position: relative;
    }

    .stat-item + .stat-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 20%;
      height: 60%;
      width: 1px;
      background: var(--border);
    }

    .stat-value {
      display: block;
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
    }

    .stat-label {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
      letter-spacing: 0.05em;
    }

    /* =================== MAIN CONTENT =================== */
    .main-content {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* =================== FILTER BAR =================== */
    .filter-section {
      padding: 32px 0 24px;
      position: sticky;
      top: 0;
      z-index: 50;
      background: linear-gradient(to bottom, var(--bg) 80%, transparent);
      padding-bottom: 16px;
    }

    .filter-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      user-select: none;
    }

    .filter-pill:hover {
      border-color: var(--border-hover);
      color: var(--text-primary);
    }

    .filter-pill.active {
      background: var(--accent-dim);
      border-color: rgba(0, 255, 136, 0.5);
      color: var(--accent);
    }

    .filter-pill .pill-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.7;
    }

    .filter-pill .pill-count {
      font-size: 11px;
      opacity: 0.6;
      margin-left: 2px;
    }

    /* =================== GRID =================== */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    @media (max-width: 1024px) {
      .cards-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 640px) {
      .cards-grid { grid-template-columns: 1fr; }
      .site-header { padding: 40px 16px 32px; }
      .main-content { padding: 0 16px 60px; }
      .stats-bar { max-width: 100%; }
    }

    /* =================== CARD =================== */
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition), opacity var(--transition);
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: cardIn 300ms ease both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      transform: scale(1.02) translateY(-2px);
    }

    .card.hidden {
      display: none;
    }

    .card.fade-out {
      opacity: 0;
      transform: scale(0.96);
      pointer-events: none;
    }

    /* Card header row */
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .card-num {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: #1a1a1a;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0;
    }

    .card-category {
      flex-shrink: 0;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    /* Card body */
    .card-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3;
      letter-spacing: -0.01em;
    }

    .card-org {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
      font-weight: 500;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      flex: 1;
    }

    /* Metric pill */
    .card-metric {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(0, 255, 136, 0.07);
      border: 1px solid rgba(0, 255, 136, 0.2);
      border-radius: var(--radius-xs);
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      font-feature-settings: 'tnum';
      align-self: flex-start;
    }

    .card-metric::before {
      content: '↗';
      font-size: 11px;
      opacity: 0.7;
    }

    /* Arrow indicator */
    .card-arrow {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: #1a1a1a;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 12px;
      transition: all var(--transition);
      opacity: 0;
    }

    .card:hover .card-arrow {
      opacity: 1;
      color: var(--text-secondary);
    }

    /* =================== EMPTY STATE =================== */
    .empty-state {
      display: none;
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state.visible {
      display: block;
    }

    .empty-state-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    /* =================== MODAL =================== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--modal-overlay);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 250ms ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: #131313;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      max-width: 560px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      transform: scale(0.94) translateY(16px);
      transition: transform 250ms cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255,255,255,0.04);
    }

    .modal-overlay.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal-top {
      padding: 28px 28px 0;
    }

    .modal-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }

    .modal-num-cat {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-num {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .modal-category {
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all var(--transition);
    }

    .modal-close:hover {
      background: #2a2a2a;
      color: var(--text-primary);
    }

    .modal-name {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.25;
      margin-bottom: 6px;
    }

    .modal-org {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 24px;
    }

    .modal-divider {
      height: 1px;
      background: var(--border);
      margin: 0 -28px;
    }

    .modal-body {
      padding: 24px 28px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .modal-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .modal-desc {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.75;
    }

    .modal-why {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.75;
    }

    .modal-metric-block {
      background: rgba(0, 255, 136, 0.06);
      border: 1px solid rgba(0, 255, 136, 0.2);
      border-radius: var(--radius-sm);
      padding: 16px;
    }

    .modal-metric-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.4;
    }

    /* =================== FOOTER =================== */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }

    .site-footer span {
      color: var(--accent);
    }

    /* =================== RESULT COUNT =================== */
    .result-info {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 16px;
      height: 16px;
      transition: opacity var(--transition);
    }

    /* Responsive modal */
    @media (max-width: 640px) {
      .modal-overlay {
        align-items: flex-end;
        padding: 0;
      }
      .modal {
        border-radius: 20px 20px 0 0;
        max-height: 85vh;
        transform: translateY(100%);
      }
      .modal-overlay.open .modal {
        transform: translateY(0);
      }
      .modal-top { padding: 20px 20px 0; }
      .modal-divider { margin: 0 -20px; }
      .modal-body { padding: 20px 20px 32px; }
      .modal-name { font-size: 19px; }
    }
  </style>
</head>

    {"id":1,"name":"Kimi FlashKDA","org":"Moonshot AI","category":"어텐션","one_line":"AI가 과거 대화를 기억할 때, 꼭 필요한 부분만 골라서 빠르게 읽는 기술이에요.","why":"긴 문서를 처리할 때 GPU 메모리를 낭비 없이 쓸 수 있어서 더 빠르고 저렴하게 서비스를 운영할 수 있습니다. 특히 H20 GPU에서 극적인 성능 향상을 보여줍니다.","metric":"프리필 2.2배 ↑, KV캐시 75% ↓","color":"#6366f1"},

    {"id":4,"name":"MoA (Mixture of Attention Spans)","org":"연구계","category":"장문컨텍스트","one_line":"AI의 각 뇌 세포가 자기에게 맞는 만큼의 기억 범위를 자동으로 골라 쓰는 기술이에요.","why":"어텐션 헤드마다 최적의 컨텍스트 길이를 자동으로 찾아서 메모리를 효율적으로 사용합니다.","metric":"처리 가능 컨텍스트 3.9배 ↑","color":"#84cc16"},

  ];

  // Category meta
  const CATEGORY_META = {};
  DATA.forEach(d => {
    if (!CATEGORY_META[d.category]) {
      CATEGORY_META[d.category] = { color: d.color, count: 0 };
    }
    CATEGORY_META[d.category].count++;
  });

  const categories = Object.keys(CATEGORY_META);
  let activeCategory = '전체';

  // ---- Hex to rgba helper ----
  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  // ---- Build filter bar ----
  const filterBar = document.getElementById('filterBar');

  function buildFilters() {
    filterBar.innerHTML = '';

    // 전체 pill
    const allPill = document.createElement('button');
    allPill.className = 'filter-pill active';
    allPill.setAttribute('data-cat', '전체');
    allPill.innerHTML = `전체 <span class="pill-count">${DATA.length}</span>`;
    allPill.addEventListener('click', () => setFilter('전체'));
    filterBar.appendChild(allPill);

    categories.forEach(cat => {
      const meta = CATEGORY_META[cat];
      const pill = document.createElement('button');
      pill.className = 'filter-pill';
      pill.setAttribute('data-cat', cat);
      pill.innerHTML = `<span class="pill-dot" style="background:${meta.color}"></span>${cat} <span class="pill-count">${meta.count}</span>`;
      pill.addEventListener('click', () => setFilter(cat));
      filterBar.appendChild(pill);
    });
  }

  function setFilter(cat) {
    activeCategory = cat;

    // Update pill states
    document.querySelectorAll('.filter-pill').forEach(p => {
      p.classList.toggle('active', p.dataset.cat === cat);
    });

    // Filter cards
    const cards = document.querySelectorAll('.card[data-id]');
    let visibleCount = 0;

    cards.forEach(card => {
      const cardCat = card.dataset.category;
      const show = (cat === '전체') || (cardCat === cat);
      if (show) {
        card.classList.remove('hidden', 'fade-out');
        visibleCount++;
      } else {
        card.classList.add('hidden');
        card.classList.remove('fade-out');
      }
    });

    const emptyState = document.getElementById('emptyState');
    emptyState.classList.toggle('visible', visibleCount === 0);

    const resultInfo = document.getElementById('resultInfo');
    if (cat === '전체') {
      resultInfo.textContent = `전체 ${DATA.length}개 기술`;
    } else {
      resultInfo.textContent = `'${cat}' 분야 ${visibleCount}개 기술`;
    }
  }

  // ---- Build cards ----
  function buildCards() {
    const grid = document.getElementById('cardsGrid');

    DATA.forEach((item, idx) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = item.id;
      card.dataset.category = item.category;
      card.style.animationDelay = `${idx * 30}ms`;

      // Dynamic border/glow on hover via JS
      const hoverColor = item.color;
      card.addEventListener('mouseenter', () => {
        card.style.borderColor = hexToRgba(hoverColor, 0.5);
        card.style.boxShadow = `0 0 24px ${hexToRgba(hoverColor, 0.12)}, 0 8px 32px rgba(0,0,0,0.4)`;
      });
      card.addEventListener('mouseleave', () => {
        card.style.borderColor = '';
        card.style.boxShadow = '';
      });

      card.innerHTML = `
        <div class="card-header">
          <div class="card-num">${String(item.id).padStart(2, '0')}</div>
          <div class="card-category" style="background:${hexToRgba(item.color, 0.15)};color:${item.color};border:1px solid ${hexToRgba(item.color, 0.3)}">${item.category}</div>
        </div>
        <div>
          <div class="card-name">${item.name}</div>
          <div class="card-org">${item.org}</div>
        </div>
        <div class="card-desc">${item.one_line}</div>
        <div class="card-metric">${item.metric}</div>
        <div class="card-arrow">↗</div>
      `;

      card.addEventListener('click', () => openModal(item));
      grid.appendChild(card);
    });
  }

  // ---- Modal ----
  const overlay = document.getElementById('modalOverlay');
  const modal = document.getElementById('modal');

  function openModal(item) {
    document.getElementById('modalNum').textContent = String(item.id).padStart(2, '0');

    const catEl = document.getElementById('modalCategory');
    catEl.textContent = item.category;
    catEl.style.background = hexToRgba(item.color, 0.15);
    catEl.style.color = item.color;
    catEl.style.border = `1px solid ${hexToRgba(item.color, 0.3)}`;

    document.getElementById('modalTitle').textContent = item.name;
    document.getElementById('modalOrg').textContent = item.org;
    document.getElementById('modalOneLine').textContent = item.one_line;
    document.getElementById('modalWhy').textContent = item.why;
    document.getElementById('modalMetric').textContent = item.metric;

    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeModal();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // ---- Init ----
  buildFilters();
  buildCards();

  // Set initial result info
  document.getElementById('resultInfo').textContent = `전체 ${DATA.length}개 기술`;
</script>
