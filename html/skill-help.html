<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Reference</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d0d; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  header { padding: 32px 24px 16px; border-bottom: 1px solid #1e1e1e; }
  header h1 { font-size: 22px; color: #00ff88; letter-spacing: 0.05em; font-weight: 700; }
  header p { font-size: 13px; color: #666; margin-top: 4px; }
  .search-wrap { padding: 16px 24px; position: sticky; top: 0; background: #0d0d0d; z-index: 10; border-bottom: 1px solid #1a1a1a; }
  .search-wrap input { width: 100%; background: #161616; border: 1px solid #2a2a2a; border-radius: 8px; padding: 10px 16px; color: #e0e0e0; font-size: 14px; outline: none; transition: border 0.2s; }
  .search-wrap input:focus { border-color: #00ff88; }
  .search-wrap input::placeholder { color: #444; }
  .tabs { display: flex; gap: 8px; padding: 12px 24px; flex-wrap: wrap; border-bottom: 1px solid #1a1a1a; }
  .tab { padding: 6px 14px; border-radius: 20px; border: 1px solid #2a2a2a; background: none; color: #888; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .tab.active, .tab:hover { background: #00ff88; color: #0d0d0d; border-color: #00ff88; font-weight: 600; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; padding: 24px; }
  .card { background: #111; border: 1px solid #1e1e1e; border-radius: 12px; padding: 20px; transition: border-color 0.2s; }
  .card:hover { border-color: #333; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cmd { font-family: 'Fira Code', monospace; font-size: 15px; color: #00ff88; font-weight: 700; }
  .cat-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .cat-영상 { background: #1a2a3a; color: #4da6ff; }
  .cat-PPT { background: #2a1a2a; color: #c084fc; }
  .cat-픽셀 { background: #1a2a1a; color: #4ade80; }
  .cat-SNS { background: #2a2a1a; color: #fbbf24; }
  .cat-문서 { background: #2a1a1a; color: #f87171; }
  .cat-기타 { background: #1e1e1e; color: #a0a0a0; }
  .desc { font-size: 13px; color: #aaa; line-height: 1.5; margin-bottom: 12px; }
  .examples { background: #0a0a0a; border-radius: 6px; padding: 10px 12px; margin-bottom: 12px; }
  .examples code { display: block; font-family: 'Fira Code', monospace; font-size: 12px; color: #7dd3fc; line-height: 1.8; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-size: 11px; color: #555; background: #161616; padding: 2px 8px; border-radius: 4px; }
  .no-results { text-align: center; padding: 60px 24px; color: #444; font-size: 15px; }
  .count { font-size: 12px; color: #555; padding: 0 24px 8px; }
</style>
</head>
<body>

<header>
  <h1>⚡ Skill Reference</h1>
  <p>Claude Code 스킬 명령어 레퍼런스</p>
</header>

<div class="search-wrap">
  <input type="text" id="search" placeholder="스킬 검색... (명령어, 설명, 태그)" oninput="filter()">
</div>

<div class="tabs" id="tabs">
  <button class="tab active" onclick="setTab('전체', this)">전체</button>
  <button class="tab" onclick="setTab('영상', this)">영상</button>
  <button class="tab" onclick="setTab('PPT', this)">PPT</button>
  <button class="tab" onclick="setTab('픽셀', this)">픽셀</button>
  <button class="tab" onclick="setTab('SNS', this)">SNS</button>
  <button class="tab" onclick="setTab('문서', this)">문서</button>
  <button class="tab" onclick="setTab('기타', this)">기타</button>
  <button class="tab" onclick="setTab('SNS', this)">SNS/영상</button>
</div>

<div class="count" id="count"></div>
<div class="grid" id="grid"></div>

<script>
const skills = [
  { id:"down-video", cmd:"/down-video", category:"SNS", desc:"Instagram, Threads, YouTube 영상을 플랫폼별 폴더에 키워드 제목으로 저장", tags:["instagram","threads","youtube","download"], examples:["/down-video \"https://www.youtube.com/watch?v=xxxx\"","/down-video \"https://www.instagram.com/reel/xxxx/\"","/down-video \"https://www.threads.com/@user/post/xxxx\""] },
  { id:"pptx-generate", cmd:"/pptx-generate", category:"PPT", desc:"PDF/이미지를 PPT 네이티브 도형/텍스트 요소로 재현한 .pptx 생성", tags:["pptx","pdf","powerpoint","presentation"], examples:["/pptx-generate reference/slide.pdf","/pptx-generate reference/slide.png output/result.pptx"] },
  { id:"reat-script", cmd:"/reat-script", category:"영상", desc:"주제/키워드 → 교육 영상용 대본(script.json + script.md) 자동 생성", tags:["script","대본","tts","영상"], examples:["/reat-script \"AI 시대의 가치 노동\"","/reat-script \"RAG 검색의 원리\" --tone casual --length 10m"] },
  { id:"reat-voice", cmd:"/reat-voice", category:"영상", desc:"script.json → ElevenLabs TTS로 MP3 + SRT 자막 자동 생성", tags:["tts","voice","mp3","srt","elevenlabs"], examples:["/reat-voice {projectId}","/reat-voice {projectId} --preview","/reat-voice --list"] },
  { id:"reat-new", cmd:"/reat-new", category:"영상", desc:"input/ 폴더의 mp3+srt 감지 → 프로젝트 생성 + reat-chunk/scene 자동 실행", tags:["project","init","mp3","srt"], examples:["/reat-new","input/ 폴더에 mp3+srt 파일을 넣으면 자동 감지"] },
  { id:"reat-chunk", cmd:"/reat-chunk", category:"영상", desc:"SRT 자막 파일을 의미 단위로 분석하여 beats.json 생성", tags:["srt","beats","chunk","분석"], examples:["/reat-chunk {projectId}"] },
  { id:"reat-scene", cmd:"/reat-scene", category:"영상", desc:"beats.json → scoring engine으로 scene-plan.json + scenes.json 생성", tags:["scene","beats","dsl"], examples:["/reat-scene {projectId}"] },
  { id:"reat-assets", cmd:"/reat-assets", category:"영상", desc:"public/assets/ 폴더 스캔 → Claude 시각 분석으로 태그/카테고리 자동 생성", tags:["assets","tag","image","gif"], examples:["/reat-assets","/reat-assets refresh"] },
  { id:"reat-layout", cmd:"/reat-layout", category:"영상", desc:"씬 계획 → Claude가 36+ 노드 조합 stack_root JSON 트리 생성 (핵심 AI 판단)", tags:["layout","json","stack","remotion"], examples:["/reat-layout {projectId}","/reat-layout {projectId} --scene 3"] },
  { id:"reat-render", cmd:"/reat-render", category:"영상", desc:"scenes-v2.json + render-props-v2.json → Remotion으로 MP4 렌더링", tags:["render","mp4","remotion","video"], examples:["/reat-render {projectId}"] },
  { id:"reat-slides", cmd:"/reat-slides", category:"영상", desc:"텍스트 목차만으로 Remotion 기반 슬라이드 영상 자동 생성 (SRT/MP3 불필요)", tags:["slides","presentation","remotion"], examples:["/reat-slides \"AI 시대의 교육\"","/reat-slides {projectId}"] },
  { id:"reat-analyze", cmd:"/reat-analyze", category:"영상", desc:"레퍼런스 이미지 분석 → 디자인 토큰 + 레이아웃 패턴 추출", tags:["design","token","analyze","reference"], examples:["/reat-analyze {projectId}"] },
  { id:"reat-catalog", cmd:"/reat-catalog", category:"영상", desc:"레이아웃 카탈로그 + Scene DSL 스키마 + 모션 프리셋 카탈로그 생성", tags:["catalog","dsl","motion","layout"], examples:["/reat-catalog {projectId}"] },
  { id:"pixl-charactor", cmd:"/pixl-charactor", category:"픽셀", desc:"사진/이미지 → 128x128 2D 픽셀 게임 캐릭터 변환 (배경제거 + 색상 양자화)", tags:["pixel","character","sprite","pixelart"], examples:["/pixl-charactor path/to/photo.png","/pixl-charactor photo.webp --pixel 3 --colors 16","/pixl-charactor photo.png --pixel 1 --colors 32 --no-outline"] },
  { id:"pixl-attack", cmd:"/pixl-attack", category:"픽셀", desc:"픽셀 캐릭터 → 6프레임 공격 애니메이션 스프라이트 시트 생성", tags:["pixel","animation","attack","sprite"], examples:["/pixl-attack character.png \"몽둥이로 때리기\"","/pixl-attack character.png \"마법 발사\" --frames 8"] },
  { id:"pixl-runany", cmd:"/pixl-runany", category:"픽셀", desc:"픽셀 캐릭터 → 8프레임 걷기/달리기 루프 애니메이션 스프라이트 시트 생성", tags:["pixel","animation","walk","run","sprite"], examples:["/pixl-runany character.png","/pixl-runany character.png --motion run"] },
  { id:"shot-wrighter", cmd:"/shot-wrighter", category:"기타", desc:"슈퍼말순 스타일 동물 쇼츠 대본 자동 생성 (50~60초 분량)", tags:["shorts","script","animal","youtube"], examples:["/shot-wrighter \"강아지 미용실\" --animal 강아지","/shot-wrighter \"고양이 카페 알바\" --animal 고양이"] },
  { id:"hwpx-skill", cmd:"/hwpx-skill", category:"문서", desc:"HWPX 한글 문서 생성·읽기·편집. 보고서/공문/기안문/회의록 등 생성", tags:["hwpx","한글","word","document","보고서"], examples:["/hwpx-skill \"분기 보고서 작성\"","/hwpx-skill \"공문 템플릿으로 기안문 생성\""] },
  { id:"auto-research", cmd:"/auto-research", category:"기타", desc:"대상 스킬을 무한 실험 루프로 자율 개선 (평가 지표 기반 SKILL.md 자동 고도화)", tags:["research","optimize","skill","loop"], examples:["/auto-research pptx-generate","/auto-research reat-layout --max-rounds 10"] },
  { id:"obsi-cleanmk", cmd:"/obsi-cleanmk", category:"문서", desc:"웹 페이지 URL → 광고·네비게이션 제거한 깔끔한 마크다운 변환", tags:["obsidian","markdown","web","scrape"], examples:["/obsi-cleanmk https://example.com/article"] },
  { id:"obsi-canvas", cmd:"/obsi-canvas", category:"문서", desc:"Obsidian JSON Canvas 파일 생성·편집 — 노드, 엣지, 그룹, 연결선 지원", tags:["obsidian","canvas","visual","graph"], examples:["/obsi-canvas 개념 맵 그려줘"] },
  { id:"obsi-md", cmd:"/obsi-md", category:"문서", desc:"Obsidian 마크다운 노트 생성·편집 — 위키링크, 임베드, 콜아웃, 프로퍼티 지원", tags:["obsidian","markdown","note","wikilink"], examples:["/obsi-md 오늘 회의 정리해줘"] },
  { id:"obsi-bases", cmd:"/obsi-bases", category:"문서", desc:"Obsidian Bases(.base) 파일 생성·편집 — 뷰, 필터, 수식, 요약 지원", tags:["obsidian","bases","database","filter"], examples:["/obsi-bases 할 일 목록 bases 만들어줘"] },
  { id:"obsi-cli", cmd:"/obsi-cli", category:"문서", desc:"Obsidian CLI로 볼트 조작 — 노트 읽기·생성·검색·관리, 플러그인 리로드", tags:["obsidian","cli","vault","search"], examples:["/obsi-cli 볼트에서 AI 관련 노트 검색해줘"] },
  { id:"tools-frontend", cmd:"/tools-frontend", category:"기타", desc:"프론트엔드 개발 오버레이 툴 — 컴포넌트 검사, 레이아웃 분석", tags:["frontend","dev","overlay","debug"], examples:["/tools-frontend"] },
  { id:"wiki", cmd:"/wiki", category:"기타", desc:"LLM-Wiki 패턴으로 개인 지식베이스 관리 — 소스 인제스트, 쿼리, 린트 수행 (/home/monday/vault)", tags:["wiki","knowledge","vault","obsidian","llm"], examples:["/wiki ingest https://example.com/article","/wiki query \"RAG vs LLM-Wiki\"","/wiki lint"] },
  { id:"json-canvas", cmd:"/json-canvas", category:"문서", desc:"JSON Canvas(.canvas) 파일 생성·편집 — 노드, 엣지, 그룹, 연결선 지원. 마인드맵, 플로우차트", tags:["canvas","json","mindmap","flowchart","obsidian"], examples:["/json-canvas 개념 맵 그려줘","/json-canvas flowchart.canvas 수정"] },
  { id:"last-30days", cmd:"/last-30days", category:"기타", desc:"최근 30일간 특정 주제에 대한 Reddit, X, YouTube 소셜 미디어 반응 수집·분석", tags:["research","reddit","twitter","youtube","trend"], examples:["/last-30days \"아이폰 16\"","/last-30days \"비트코인 전망\" --sources reddit","/last-30days \"한국 부동산\" --lang ko"] },
  { id:"mark-clean", cmd:"/mark-clean", category:"문서", desc:"웹 페이지 URL → Defuddle CLI로 광고·네비게이션 제거한 클린 마크다운 추출", tags:["markdown","web","scrape","clean","defuddle"], examples:["/mark-clean https://example.com/article","/mark-clean https://docs.example.com/guide"] },
  { id:"down-analysis", cmd:"/down-analysis", category:"SNS", desc:"down-video로 다운로드된 영상 분석 — 트랜스크립트 추출, 장면 감지, Gemini 멀티모달 분석", tags:["video","analysis","transcript","gemini","down-video"], examples:["/down-analysis video.mp4","/down-analysis \"최신영상\" --focus \"제품 정보만\"","/down-analysis video.mp4 --lang ko"] },
  { id:"trip-advisor", cmd:"/trip-advisor", category:"기타", desc:"TourAPI + 블로그 검색으로 종합 여행 가이드 생성 — 관광지, 맛집, 축제, 숙박", tags:["travel","tour","맛집","여행","축제"], examples:["/trip-advisor \"부산 여행 코스 짜줘\"","/trip-advisor \"경주 맛집 추천\" --type 맛집","/trip-advisor \"제주 4월 축제\" --date 2026-04"] },
];

let currentTab = '전체';

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  filter();
}

function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  const visible = skills.filter(s => {
    const matchTab = currentTab === '전체' || s.category === currentTab;
    const matchQ = !q || s.cmd.includes(q) || s.desc.toLowerCase().includes(q) || s.tags.some(t => t.includes(q)) || s.category.includes(q);
    return matchTab && matchQ;
  });
  render(visible);
}

function render(list) {
  const grid = document.getElementById('grid');
  document.getElementById('count').textContent = `${list.length}개 스킬`;
  if (!list.length) {
    grid.innerHTML = '<div class="no-results" style="grid-column:1/-1">검색 결과가 없습니다</div>';
    return;
  }
  grid.innerHTML = list.map(s => `
    <div class="card">
      <div class="card-header">
        <span class="cmd">${s.cmd}</span>
        <span class="cat-badge cat-${s.category}">${s.category}</span>
      </div>
      <div class="desc">${s.desc}</div>
      <div class="examples">${s.examples.map(e => `<code>${e}</code>`).join('')}</div>
      <div class="tags">${s.tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>
    </div>
  `).join('');
}

render(skills);
document.getElementById('count').textContent = `${skills.length}개 스킬`;
</script>
</body>
</html>
