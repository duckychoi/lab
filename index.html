<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>duckychoi · lab</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #2a2a3e;
    --accent: #7c6ff7;
    --accent2: #e879f9;
    --accent3: #22d3ee;
    --accent4: #4ade80;
    --text: #e2e8f0;
    --muted: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }

  .hero {
    padding: 80px 40px 60px;
    text-align: center;
    background: linear-gradient(135deg, #0a0a1f, #1a0a2e, #0f1a2e);
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(124,111,247,0.1) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 50%, rgba(232,121,249,0.08) 0%, transparent 60%);
  }
  .hero-title {
    font-size: clamp(32px, 6vw, 64px);
    font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
    margin-bottom: 12px;
  }
  .hero-sub {
    color: var(--muted);
    font-size: 15px;
    position: relative;
  }

  .container { max-width: 900px; margin: 0 auto; padding: 60px 24px; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 24px;
  }

  .doc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .doc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: all 0.2s;
  }
  .doc-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(124,111,247,0.15);
  }
  .doc-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 14px;
  }
  .tag-ai { background: rgba(124,111,247,0.15); color: var(--accent); border: 1px solid rgba(124,111,247,0.3); }
  .tag-video { background: rgba(232,121,249,0.12); color: var(--accent2); border: 1px solid rgba(232,121,249,0.25); }
  .tag-workflow { background: rgba(34,211,238,0.10); color: var(--accent3); border: 1px solid rgba(34,211,238,0.25); }

  .doc-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .doc-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .doc-meta {
    font-size: 11px;
    color: #4a5568;
  }

  .empty-card {
    background: rgba(255,255,255,0.02);
    border: 1px dashed var(--border);
    border-radius: 16px;
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #2a3040;
    min-height: 140px;
  }

  .footer {
    border-top: 1px solid var(--border);
    padding: 24px;
    text-align: center;
    font-size: 12px;
    color: #2a3040;
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-title">duckychoi · lab</div>
  <div class="hero-sub">분석 문서 & 시각화 허브</div>
</div>

<div class="container">
  <div class="section-label">Documents</div>
  <div class="doc-grid">

    <a href="higgsfield-analysis.html" class="doc-card">
      <span class="doc-tag tag-ai">AI · Video</span>
      <div class="doc-title">Higgsfield 심층 분석</div>
      <div class="doc-desc">Cinema Studio & 프롬프트 엔지니어링 노하우 — Soul Cast + Scene 메커니즘, 타임스탬프 구간 제어, Claude Code 자동화 파이프라인</div>
      <div class="doc-meta">2026-04-10</div>
    </a>

    <div class="empty-card">+ 다음 문서</div>
    <div class="empty-card">+ 다음 문서</div>

  </div>
</div>

<div class="footer">github.com/duckychoi/lab</div>

</body>
</html>
